<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인테리어 인사이트 | 관리자 게시판</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .blog-container { padding: 40px 0; }
        .post-form { background: #f9f9f9; padding: 25px; border-radius: 10px; margin-bottom: 40px; border: 1px solid #eee; }
        .post-form h3 { margin-bottom: 20px; color: var(--primary-color); }
        .post-form input, .post-form textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; font-family: inherit; }
        .post-form button { background: var(--primary-color); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: 700; }
        .post-list { list-style: none; }
        .post-item { border-bottom: 1px solid #eee; padding: 25px 0; cursor: pointer; transition: background 0.2s; }
        .post-item:hover { background: #fafafa; }
        .post-item h3 { margin-bottom: 10px; color: var(--secondary-color); }
        .post-item p { font-size: 0.9rem; color: #666; margin-bottom: 10px; }
        .post-item .meta { font-size: 0.8rem; color: #999; display: flex; justify-content: space-between; }
        .btn-delete { color: #e74c3c; cursor: pointer; border: none; background: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/" style="text-decoration: none; color: inherit;">INTERIOR INSIGHT</a></h1>
        </div>
    </header>

    <main class="container blog-container">
        <h2>실내건축 정보 게시판 (관리자)</h2>
        
        <div class="post-form">
            <h3>새 게시글 작성</h3>
            <input type="text" id="post-title" placeholder="제목을 입력하세요">
            <textarea id="post-desc" rows="2" placeholder="간략한 요약 내용을 입력하세요 (메인 피드 노출)"></textarea>
            <textarea id="post-content" rows="6" placeholder="상세 내용을 입력하세요"></textarea>
            <button onclick="addPost()">등록하기</button>
        </div>

        <ul class="post-list" id="post-list">
            <!-- Posts will be loaded here -->
        </ul>
    </main>

    <div id="post-modal" class="modal">
        <div class="modal-content post-detail">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="post-detail-content"></div>
        </div>
    </div>

    <script>
        const defaultPosts = [
            { id: 1, title: "인테리어 사기 안당하는 법 3가지", date: "2026.03.01", desc: "가장 중요한 것은 실내건축공사 면허 보유 여부입니다. 면허가 없는 업체와의 계약은 추후 법적 분쟁 시 매우 불리하게 작용할 수 있습니다.", content: "인테리어 공사를 계획 중이시라면 반드시 다음 세 가지를 확인하세요.\n\n1. KISCON을 통한 실내건축공사업 면허 조회\n2. 하자이행보증보험 가입 가능 여부 확인\n3. 상세한 견적서와 공정표 요청" },
            { id: 2, title: "부산 아파트 리모델링 시 주의사항", date: "2026.02.28", desc: "단지별 관리사무소 협의 및 공사 신고 절차 안내입니다. 특히 노후 아파트의 경우 배관 및 결로 문제 해결이 시급합니다.", content: "부산 지역 아파트 리모델링은 습도가 높은 해안가 특성을 고려해야 합니다.\n\n- 단열 공사: 결로 방지를 위한 프리미엄 단열재 사용 권장\n- 소음 신고: 공사 최소 2주 전 관리사무소 신고 및 주민 동의 확보" },
            { id: 3, title: "실내건축면허 조회 방법 안내", date: "2026.02.25", desc: "국토교통부 운영 키스콘을 통한 정확한 업체 확인법. 업체명만 알면 누구나 1분만에 조회가 가능합니다.", content: "KISCON 사이트 접속 후 '업체조회' 메뉴에서 업체명을 검색하세요. 실내건축공사업 면허가 검색되지 않는다면 1,500만원 이상의 공사를 맡겨서는 안 됩니다." },
            { id: 14, title: "부산 인테리어 전문 업체 선정 시 필수 체크리스트", date: "2026.02.24", desc: "부산 지역에서 믿을 수 있는 인테리어 업체를 고르는 팁입니다. 포트폴리오와 면허 확인은 기본입니다.", content: "부산 인테리어 업체 선정 시 다음을 확인하세요.\n1. 실내건축공사업 면허 보유 여부 (KISCON 확인)\n2. 부산 지역 내 실제 시공 사례(포트폴리오) 확인\n3. 사후 관리(A/S) 기간 및 보증 범위 명시 여부" },
            { id: 15, title: "성공적인 부산 학원 인테리어를 위한 핵심 포인트", date: "2026.02.23", desc: "학원 설립 허가 기준에 맞는 소방 시설 및 공간 구획 노하우를 공개합니다. 교육 환경 최적화가 정답입니다.", content: "학원 인테리어는 디자인보다 '허가'가 우선입니다.\n- 소방 완비 증명서 발급을 위한 불연재 사용\n- 강의실 면적 기준 준수\n- 학습 집중도를 높이는 4000K 주백색 조명 설계" },
            { id: 16, title: "쾌적한 업무 환경을 위한 부산 사무실 인테리어 팁", date: "2026.02.22", desc: "생산성을 높이는 사무실 레이아웃과 직원들의 휴게 공간 구성 방법을 제안합니다.", content: "사무실 인테리어의 트렌드는 '소통'과 '휴식'입니다.\n- 개방형 업무 공간과 집중형 부스 병행\n- 동선을 고려한 탕비실 및 라운지 배치\n- 기업 브랜드 컬러를 활용한 포인트 벽면 디자인" },
            { id: 17, title: "미니멀리즘 인테리어 실천법: 비움의 미학", date: "2026.02.21", desc: "불필요한 가구와 소품을 줄여 공간의 개방감을 극대화하는 미니멀 인테리어의 기초를 알아봅니다.", content: "미니멀리즘은 무조건 버리는 것이 아니라, 나에게 꼭 필요한 것에 집중하는 것입니다. 히든 수납장을 활용해 시각적 노이즈를 줄이세요." },
            { id: 4, title: "거실 인테리어, 넓어 보이는 배치 팁", date: "2026.02.20", desc: "가구의 높이를 낮추고 여백을 활용하는 것이 거실을 더 넓어 보이게 하는 핵심 전략입니다.", content: "1. 낮은 소파 선택\n2. 벽면 색상과 맞춘 커튼 설치\n3. 다리가 얇은 가구 활용으로 개방감 확보" },
            { id: 18, title: "셀프 인테리어 도전 전 체크리스트", date: "2026.02.19", desc: "비용 절감을 위해 시작하는 셀프 인테리어, 하지만 예상치 못한 변수가 많습니다. 미리 준비하세요.", content: "직접 할 수 있는 공정(페인트, 필름)과 전문가가 필요한 공정(전기, 설비)을 명확히 구분하는 것이 실패를 줄이는 지름길입니다." },
            { id: 5, title: "조명 하나로 바뀌는 침실 분위기", date: "2026.02.18", desc: "메인 조명보다는 간접 조명과 스탠드를 활용하여 아늑한 침실 무드를 조성하는 방법을 소개합니다.", content: "침실은 휴식의 공간입니다. 3000K 내외의 전구색 조명을 활용해 눈의 피로를 낮추고 심리적 안정감을 높이세요." },
            { id: 19, title: "좁은 현관을 넓어 보이게 만드는 디자인", date: "2026.02.17", desc: "집의 첫인상인 현관, 거울과 하부 띄움 신발장을 활용해 좁은 공간을 극복하는 팁입니다.", content: "현관 중문은 투명 유리를 사용해 개방감을 주고, 하부 간접 조명을 설치하면 공간이 훨씬 깊어 보입니다." },
            { id: 20, title: "인테리어 견적 비교, '최저가'만 찾으면 안 되는 이유", date: "2026.02.16", desc: "너무 저렴한 견적은 자재 변경이나 추가 비용 발생의 원인이 됩니다. 합리적인 견적 분석법을 안내합니다.", content: "견적서의 '식' 단위 표기를 주의하세요. 상세 내역과 자재 브랜드가 명시된 업체를 선택해야 나중에 분쟁이 없습니다." },
            { id: 6, title: "주방 동선 설계의 기본, 삼각 동선", date: "2026.02.15", desc: "냉장고, 개수대, 가열대의 배치를 최적화하여 요리 시간을 단축하는 주방 동선 가이드입니다.", content: "삼각 동선(Work Triangle)의 합이 4~6미터 사이일 때 가장 효율적인 주방 작업이 가능합니다." },
            { id: 21, title: "원룸 인테리어: 가벽을 활용한 공간 분리", date: "2026.02.14", desc: "침실과 거실을 분리하고 싶다면 낮은 가벽이나 오픈형 책장을 활용해 보세요.", content: "답답하지 않게 공간을 나누는 것이 포인트입니다. 유리 가벽은 시각적 개방감을 유지하면서도 독립된 공간감을 줍니다." },
            { id: 22, title: "우리 집에 어울리는 바닥재 컬러 선택 가이드", date: "2026.02.13", desc: "화이트, 오크, 월넛 등 바닥재 색상에 따라 달라지는 집안 분위기를 비교해 드립니다.", content: "좁은 집은 밝은 톤의 바닥재로 넓어 보이게, 넓은 집은 무게감 있는 짙은 톤으로 고급스럽게 연출하는 것이 일반적입니다." },
            { id: 7, title: "욕실 타일 선택 가이드: 미끄럼 방지 필수", date: "2026.02.12", desc: "미적인 요소만큼 중요한 안전! 욕실 바닥 타일 선택 시 반드시 확인해야 할 논슬립 등급 안내입니다.", content: "욕실 바닥은 R10 이상의 논슬립 등급을 가진 포세린 타일을 추천합니다." },
            { id: 23, title: "겨울철 인테리어: 패브릭 소품 활용하기", date: "2026.02.11", desc: "러그와 쿠션, 두꺼운 커튼만으로도 실내 온도를 높이고 따뜻한 분위기를 연출할 수 있습니다.", content: "벨벳이나 울 소재의 패브릭은 시각적인 온기를 줄 뿐만 아니라 실제로 실내 온기를 잡아두는 효과가 있습니다." },
            { id: 8, title: "베란다 확장 공사 시 결로 방지 대책", date: "2026.02.10", desc: "단열 공사가 미흡하면 곰팡이의 원인이 됩니다. 베란다 확장 시 필수적인 단열재 시공법을 알아봅니다.", content: "우레탄 폼 단열과 이중창 설치는 선택이 아닌 필수입니다. 틈새 없는 시공이 결로를 막습니다." },
            { id: 24, title: "홈 오피스 꾸미기: 집중력을 높이는 조명", date: "2026.02.09", desc: "재택근무자를 위한 최적의 책상 위치와 눈이 편안한 조명 배치 노하우를 소개합니다.", content: "창을 등지는 것보다 측면에 두는 것이 모니터 반사를 줄입니다. 책상 전용 스탠드로 조도를 확보하세요." },
            { id: 9, title: "중문 설치가 냉난방비 절감에 미치는 영향", date: "2026.02.08", desc: "현관에서 들어오는 찬바람을 막아주는 중문의 에너지 절감 효과와 소음 차단 기능을 분석합니다.", content: "중문 설치만으로도 실내 온도를 2~3도 가량 높게 유지할 수 있어 난방비 절감에 큰 도움이 됩니다." },
            { id: 25, title: "주방 상부장 없는 인테리어의 장단점", date: "2026.02.07", desc: "카페 같은 주방을 꿈꾼다면 상부장 제거를 고민해 보세요. 수납과 미학 사이의 선택 가이드입니다.", content: "개방감은 최고지만 수납 공간이 부족해집니다. 하부장 수납을 극대화하거나 별도의 팬트리가 필요합니다." },
            { id: 26, title: "카페 같은 다이닝룸 만드는 가구 배치", date: "2026.02.06", desc: "라운드 테이블과 펜던트 조명을 활용해 거실 한 켠을 멋진 홈카페로 변신시켜 보세요.", content: "식탁 위의 조명 높이는 테이블 상판에서 70~80cm 위가 가장 적당하며 따뜻한 전구색을 추천합니다." },
            { id: 10, title: "작은 방 수납 공간 극대화 전략", date: "2026.02.05", desc: "수직 공간과 가구 밑 공간을 활용하여 좁은 방을 더 효율적으로 사용하는 수납 팁입니다.", content: "상부장 설치와 멀티 가구(수납형 침대 등)를 활용하여 바닥 노출 면적을 최대한 확보하세요." },
            { id: 11, title: "친환경 페인트와 일반 페인트의 차이점", date: "2026.02.03", desc: "VOC 배출량과 냄새, 건강에 미치는 영향을 중심으로 친환경 페인트 선택의 중요성을 알아봅니다.", content: "친환경 인증 마크를 확인하세요. 아토피나 호흡기 질환이 있다면 수성 친환경 페인트가 정답입니다." },
            { id: 12, title: "마루 종류별 장단점 비교 (강마루 vs 강화마루)", date: "2026.02.01", desc: "내구성과 열전도율, 시공 방식에 따른 국내 바닥재 시장의 두 강자를 완벽 비교 분석합니다.", content: "찍힘에 강한 강화마루와 보행감 및 열전도율이 좋은 강마루 중 본인의 라이프스타일에 맞는 선택을 돕습니다." },
            { id: 13, title: "플랜테리어: 실내 공기 정화 식물 추천", date: "2026.01.28", desc: "인테리어 효과와 공기 정화 기능을 동시에 잡는 초보자용 식물 리스트를 공개합니다.", content: "스투키, 산세베리아, 고무나무는 관리가 쉬우면서도 공기 정화 능력이 탁월한 식물입니다." }
        ];

        function getPosts() {
            const stored = localStorage.getItem('pbn_posts');
            return stored ? JSON.parse(stored) : defaultPosts;
        }

        function savePosts(posts) {
            localStorage.setItem('pbn_posts', JSON.stringify(posts));
            renderPosts();
        }

        function addPost() {
            const title = document.getElementById('post-title').value;
            const desc = document.getElementById('post-desc').value;
            const content = document.getElementById('post-content').value;
            
            if(!title || !content) return alert('제목과 상세 내용을 입력해주세요.');

            const posts = getPosts();
            const newPost = {
                id: Date.now(),
                title: title,
                desc: desc || title,
                content: content,
                date: new Date().toLocaleDateString()
            };

            posts.unshift(newPost);
            savePosts(posts);

            document.getElementById('post-title').value = '';
            document.getElementById('post-desc').value = '';
            document.getElementById('post-content').value = '';
            alert('게시글이 등록되었습니다.');
        }

        function deletePost(id, e) {
            e.stopPropagation();
            if(!confirm('정말 삭제하시겠습니까?')) return;
            const posts = getPosts().filter(p => p.id != id);
            savePosts(posts);
        }

        function openModal() { document.getElementById('post-modal').style.display = "block"; }
        function closeModal() { document.getElementById('post-modal').style.display = "none"; }

        function showDetail(id) {
            const post = getPosts().find(p => p.id == id);
            if(!post) return;

            document.getElementById('post-detail-content').innerHTML = `
                <h2 style="color: var(--primary-color); margin-bottom: 10px;">${post.title}</h2>
                <p style="font-size: 0.8rem; color: #999; margin-bottom: 20px;">작성일: ${post.date}</p>
                <div style="line-height: 1.8; color: #444; white-space: pre-wrap;">${post.content}</div>
            `;
            openModal();
        }

        function renderPosts() {
            const list = document.getElementById('post-list');
            list.innerHTML = '';
            const posts = getPosts();
            
            posts.forEach(post => {
                const li = document.createElement('li');
                li.className = 'post-item';
                li.onclick = () => showDetail(post.id);
                li.innerHTML = `
                    <h3>${post.title}</h3>
                    <p>${post.desc}</p>
                    <div class="meta">
                        <span>${post.date}</span>
                        <button class="btn-delete" onclick="deletePost(${post.id}, event)">삭제</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        window.onclick = function(event) {
            if (event.target.className === 'modal') closeModal();
        }

        renderPosts();
    </script>
</body>
</html>
